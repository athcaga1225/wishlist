<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待買清單</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    /* --- CSS 樣式：完全對齊你原始喜歡的 Dashboard 風格 --- */
    :root {
      --bg-color: #F4F5F7; --panel-bg: #FFFFFF; --text-main: #111111;
      --twice-magenta: #FF4181; --twice-apricot: #F8CB9C;
      --twice-gradient: linear-gradient(135deg, var(--twice-magenta) 0%, var(--twice-apricot) 100%);
      --priority-high: #FF3B30; --priority-medium: #FF9500; --priority-low: #34C759;
    }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .container { max-width: 1000px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; overflow: hidden; }
    
    /* DASHBOARD 區塊 (恢復原樣) */
    .dashboard { background: var(--twice-gradient); color: #FFFFFF; padding: 24px 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-radius: 8px; flex-shrink: 0; }
    .dashboard-stats h1 { margin: 0; font-size: 24px; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
    .dashboard-stats p { margin: 8px 0 0 0; font-size: 16px; opacity: 0.9; }
    .btn-toggle-form { background-color: #FFFFFF; color: var(--twice-magenta); border: none; padding: 12px 0; width: 140px; text-align: center; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    
    /* 表單樣式 */
    .form-panel { background-color: var(--panel-bg); padding: 20px; margin-bottom: 20px; display: none; border-radius: 8px; flex-shrink: 0; }
    .form-panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-group { display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    input, select { padding: 12px; background-color: #f2f2f2; border: none; border-radius: 4px; outline: none; }
    .btn-submit { grid-column: 1 / -1; background: var(--twice-gradient); color: #FFFFFF; border: none; padding: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
    
    /* 列表區塊 */
    .list-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; overflow-y: auto; padding: 5px; flex-grow: 1; }
    .item-card { background-color: var(--panel-bg); padding: 16px; display: flex; flex-direction: column; border-radius: 8px; height: fit-content; position: relative; }
    .item-image { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; border-radius: 6px; margin-bottom: 8px; cursor: grab; }
    .member-tag { font-size: 16px; margin-bottom: 4px; }
    .item-title { font-size: 14px; font-weight: bold; margin: 0 0 4px 0; min-height: 2.4em; }
    .item-price { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
    .tag { padding: 3px 6px; font-size: 11px; font-weight: bold; color: #FFFFFF; border-radius: 4px; display: inline-block; margin-bottom: 5px; width: fit-content; }
    .tag-high { background-color: var(--priority-high); }
    .tag-medium { background-color: var(--priority-medium); }
    .tag-low { background-color: var(--priority-low); }
    .btn-link { background-color: var(--twice-magenta); color: #FFFFFF; text-decoration: none; padding: 4px 8px; font-size: 12px; border-radius: 4px; display: inline-block; }
    .btn-delete { background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; font-size: 12px; float: right; }
  </style>
</head>

<body>
  <div class="container">
    <div class="dashboard">
      <div class="dashboard-stats">
        <h1>待買清單</h1>
        <p id="statsText">0 項 ｜ NT$ 0</p>
      </div>
      <button class="btn-toggle-form" id="btnToggleForm">+ 新增商品</button>
    </div>

    <div class="form-panel" id="formPanel">
      <h2>新增商品項目</h2>
      <form id="addItemForm">
        <div class="form-grid">
          <div class="form-group"><label>商品圖片</label><input type="file" id="itemImageFile" accept="image/*" required></div>
          <div class="form-group"><label>成員</label>
            <select id="itemMember">
              <option value="🍇">🍇</option><option value="🫐">🫐</option><option value="🍭">🍭</option>
            </select>
          </div>
          <div class="form-group"><label>品名</label><input type="text" id="itemName" required></div>
          <div class="form-group"><label>價格</label><input type="number" id="itemPrice" required></div>
          <div class="form-group"><label>優先順序</label>
            <select id="itemPriority">
              <option value="high">高</option><option value="medium">中</option><option value="low">低</option>
            </select>
          </div>
          <div class="form-group"><label>購買網址</label><input type="url" id="itemLink" placeholder="https://..."></div>
          <button type="submit" class="btn-submit" id="btnSubmit">儲存至清單</button>
        </div>
      </form>
    </div>
    <div class="list-panel" id="listPanel"></div>
  </div>

  <script>
    const API_URL = 'https://sheetdb.io/api/v1/lbfdjay316stk';
    const form = document.getElementById('addItemForm');
    const listPanel = document.getElementById('listPanel');
    const formPanel = document.getElementById('formPanel');
    const btnToggleForm = document.getElementById('btnToggleForm');
    const statsText = document.getElementById('statsText');
    const fileInput = document.getElementById('itemImageFile');
    
    let shoppingList = [];
    let currentBase64Image = '';

    btnToggleForm.addEventListener('click', () => {
      formPanel.classList.toggle('active');
      btnToggleForm.innerText = formPanel.classList.contains('active') ? '- 收起表單' : '+ 新增商品';
    });

    fileInput.addEventListener('change', (e) => {
      const reader = new FileReader();
      reader.onload = (evt) => currentBase64Image = evt.target.result;
      reader.readAsDataURL(e.target.files[0]);
    });

    const formatPrice = (p) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(p);

    const fetchData = async () => {
      try {
        const response = await fetch(API_URL);
        shoppingList = await response.json();
        renderList();
      } catch (err) { console.error("讀取失敗", err); }
    };

    const renderList = () => {
      listPanel.innerHTML = '';
      const total = shoppingList.reduce((sum, item) => sum + Number(item.price || 0), 0);
      statsText.innerText = `${shoppingList.length} 項 ｜ ${formatPrice(total)}`;
      
      shoppingList.forEach(item => {
        const pClass = item.priority === 'high' ? 'tag-high' : item.priority === 'medium' ? 'tag-medium' : 'tag-low';
        const pText = item.priority === 'high' ? '高' : item.priority === 'medium' ? '中' : '低';
        
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <img src="${item.image}" class="item-image">
          <div class="member-tag">${item.member || ''}</div>
          <span class="tag ${pClass}">優先：${pText}</span>
          <h3 class="item-title">${item.name}</h3>
          <div class="item-price">${formatPrice(item.price)}</div>
          <div>
            ${item.link ? `<a href="${item.link}" target="_blank" class="btn-link">前往通路</a>` : ''}
            <button class="btn-delete" onclick="deleteItem('${item.id}')">刪除</button>
          </div>
        `;
        listPanel.appendChild(card);
      });
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newItem = {
        id: Date.now(),
        image: currentBase64Image,
        member: document.getElementById('itemMember').value,
        name: document.getElementById('itemName').value,
        price: document.getElementById('itemPrice').value,
        priority: document.getElementById('itemPriority').value,
        link: document.getElementById('itemLink').value
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ data: [newItem] })
        });
        form.reset();
        currentBase64Image = '';
        formPanel.classList.remove('active');
        btnToggleForm.innerText = '+ 新增商品';
        fetchData();
      } catch (err) { alert("新增失敗"); }
    });

    window.deleteItem = async (id) => {
      if(confirm('確定刪除？')) {
        await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
        fetchData();
      }
    };

    fetchData();
  </script>
</body>
</html>
