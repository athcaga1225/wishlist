<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待買清單 V6.0 雲端版</title>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    /* 全域色塊設定 */
    :root {
      --bg-color: #F4F5F7;
      --panel-bg: #FFFFFF;
      --text-main: #111111;
      --text-muted: #999999;
      --primary: #000000;
      --input-bg: #EAEAEA;
      --twice-magenta: #FF4181;
      --twice-apricot: #F8CB9C;
      --twice-gradient: linear-gradient(135deg, var(--twice-magenta) 0%, var(--twice-apricot) 100%);
      --priority-high: #FF3B30;
      --priority-medium: #FF9500;
      --priority-low: #34C759;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 頂部統計區塊 */
    .dashboard {
      background: var(--twice-gradient);
      color: #FFFFFF;
      padding: 24px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .dashboard-stats h1 { margin: 0; font-size: 24px; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1); }
    .dashboard-stats p { margin: 8px 0 0 0; font-size: 16px; color: #FFFFFF; opacity: 0.9; }

    .btn-toggle-form {
      background-color: #FFFFFF;
      color: var(--twice-magenta);
      border: none;
      padding: 12px 0;
      width: 140px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }

    /* 上稿表單區塊 */
    .form-panel { background-color: var(--panel-bg); padding: 30px; margin-bottom: 30px; display: none; border-radius: 8px; }
    .form-panel.active { display: block; }
    .form-panel h2 { margin: 0 0 20px 0; font-size: 18px; color: var(--twice-magenta); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 8px; font-size: 14px; }

    input { padding: 12px; background-color: #f2f2f2; border: none; outline: none; font-size: 14px; color: var(--text-main); border-radius: 4px; }
    input[type="file"] { padding: 9px; cursor: pointer; }

    select {
      appearance: none; -webkit-appearance: none; padding: 12px 36px 12px 12px; 
      background-color: #f2f2f2; border: none; outline: none; font-size: 14px; color: var(--text-main); border-radius: 4px; cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 12px center; background-size: 14px;
    }

    .btn-submit {
      grid-column: 1 / -1; background: var(--twice-gradient); color: #FFFFFF; border: none; padding: 16px; font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 10px; border-radius: 4px; transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.85; }

    .list-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

    @media (max-width: 650px) {
      .form-grid { grid-template-columns: 1fr; }
      .list-panel { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }

    /* 卡片設計 */
    .item-card {
      position: relative; background-color: var(--panel-bg); padding: 16px; display: flex; flex-direction: column;
      border-radius: 8px; box-sizing: border-box; transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .sortable-ghost { opacity: 0.4; background-color: #EAEAEA; transform: scale(0.98); }

    /* 懸浮編輯按鈕 */
    .btn-edit-dots {
      position: absolute; top: 24px; right: 24px; width: 32px; height: 32px;
      background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px); border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15); transition: background-color 0.2s, transform 0.2s; z-index: 10;
      opacity: 0; transform: translateY(5px);
    }
    .item-card:hover .btn-edit-dots { opacity: 1; transform: translateY(0); }
    .btn-edit-dots:hover { background-color: #FFFFFF; transform: scale(1.05); }
    .btn-edit-dots svg { width: 16px; height: 16px; stroke: var(--text-main); fill: none; }

    .item-image {
      width: 100%; aspect-ratio: 3 / 4; background-color: var(--input-bg); object-fit: cover;
      border-radius: 6px; margin-bottom: 12px; cursor: grab; -webkit-user-drag: none; user-select: none;
    }
    .item-image:active { cursor: grabbing; }
    .item-title { font-size: 15px; font-weight: bold; margin: 0 0 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; height: 2.8em; }
    .item-price { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: var(--text-main); }
    .item-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 16px; }
    
    .tag { padding: 4px 8px; font-size: 12px; font-weight: bold; color: #FFFFFF; border-radius: 4px; }
    .tag-high { background-color: var(--priority-high); }
    .tag-medium { background-color: var(--priority-medium); }
    .tag-low { background-color: var(--priority-low); }

    .btn-link { background-color: var(--twice-magenta); color: #FFFFFF; text-decoration: none; padding: 4px 10px; font-size: 12px; font-weight: bold; text-align: center; border-radius: 4px; white-space: nowrap; transition: opacity 0.2s; }
    .btn-link:hover { opacity: 0.85; }

    .item-actions { display: flex; justify-content: flex-start; align-items: center; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--input-bg); gap: 10px; }
    .btn-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 0; text-decoration: underline; white-space: nowrap; margin-left: auto; }
    .btn-delete:hover { color: var(--priority-high); }

    /* 全螢幕讀取畫面 */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--input-bg); border-top: 4px solid var(--twice-magenta);
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; font-weight: bold; color: var(--twice-magenta); letter-spacing: 1px; }

  </style>
</head>

<body>

  <!-- 讀取中遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">資料同步中...</div>
  </div>

  <div class="container">
    <div class="dashboard">
      <div class="dashboard-stats">
        <h1>待買清單</h1>
        <p id="statsText">0 項 ｜ NT$ 0</p>
      </div>
      <button class="btn-toggle-form" id="btnToggleForm">+ 新增商品</button>
    </div>

    <div class="form-panel" id="formPanel">
      <h2 id="formTitle">新增商品項目</h2>
      <form id="addItemForm">
        <div class="form-grid">
          <div class="form-group">
            <label id="imageLabel">商品圖片</label>
            <input type="file" id="itemImageFile" accept="image/*">
          </div>
          <div class="form-group">
            <label>品名</label>
            <input type="text" id="itemName" placeholder="例如：SANA 會場限定隨機小卡" required>
          </div>
          <div class="form-grid" style="grid-column: span 1; gap: 20px; padding: 0;">
            <div class="form-group">
              <label>價格</label>
              <input type="number" id="itemPrice" placeholder="輸入數字" required>
            </div>
            <div class="form-group">
              <label>優先順序</label>
              <select id="itemPriority">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>通路連結 (選填)</label>
            <input type="url" id="itemLink" placeholder="https://...">
          </div>
          <button type="submit" class="btn-submit" id="btnSubmit">儲存至清單</button>
        </div>
      </form>
    </div>

    <div class="list-panel" id="listPanel"></div>
  </div>

  <script>
    // SheetDB API 網址
    const API_URL = 'https://sheetdb.io/api/v1/lbfdjay316stk';
    
    const form = document.getElementById('addItemForm');
    const listPanel = document.getElementById('listPanel');
    const formPanel = document.getElementById('formPanel');
    const btnToggleForm = document.getElementById('btnToggleForm');
    const statsText = document.getElementById('statsText');
    const fileInput = document.getElementById('itemImageFile');
    const formTitle = document.getElementById('formTitle');
    const btnSubmit = document.getElementById('btnSubmit');
    const imageLabel = document.getElementById('imageLabel');
    const loadingOverlay = document.getElementById('loadingOverlay');

    let shoppingList = [];
    let currentBase64Image = '';
    let editingId = null;

    const showLoading = () => loadingOverlay.style.display = 'flex';
    const hideLoading = () => loadingOverlay.style.display = 'none';

    // 初始讀取雲端資料
    async function loadData() {
      showLoading();
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // 格式化從試算表來的資料 (全轉為字串，需轉回正確格式)
        shoppingList = data.map(item => ({
          ...item,
          id: Number(item.id),
          price: Number(item.price)
        }));

        // 讀取本機儲存的自訂排序順序
        const savedOrder = JSON.parse(localStorage.getItem('mySortOrderV6')) || [];
        if (savedOrder.length > 0) {
          shoppingList.sort((a, b) => {
            let indexA = savedOrder.indexOf(a.id);
            let indexB = savedOrder.indexOf(b.id);
            if(indexA === -1) indexA = 9999;
            if(indexB === -1) indexB = 9999;
            return indexA - indexB;
          });
        }
        renderList();
      } catch (error) {
        console.error("API 讀取失敗", error);
        alert('無法連線到雲端資料庫，請稍後再試！');
      }
      hideLoading();
    }

    btnToggleForm.addEventListener('click', () => {
      if (formPanel.classList.contains('active') && editingId !== null) resetFormMode();
      formPanel.classList.toggle('active');
      btnToggleForm.innerText = formPanel.classList.contains('active') ? '- 收起表單' : '+ 新增商品';
    });

    // 內建圖片壓縮黑科技 (防爆試算表格)
    fileInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (evt) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500; // 將圖片寬度壓縮至最高 500px
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // 轉成 JPEG 格式，品質 60%
            currentBase64Image = canvas.toDataURL('image/jpeg', 0.6); 
          }
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    const formatPrice = (price) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(price);

    const updateStats = () => {
      const totalAmount = shoppingList.reduce((sum, item) => sum + item.price, 0);
      statsText.innerText = `${shoppingList.length} 項 ｜ ${formatPrice(totalAmount)}`;
    };

    const renderList = () => {
      listPanel.innerHTML = '';
      updateStats();

      if (shoppingList.length === 0) {
        listPanel.innerHTML = '<div style="grid-column: 1 / -1; background:#fff; padding:60px 40px; text-align:center; color:#999; border-radius: 8px; font-size: 16px;">目前清單空空的，來新增你想買的周邊吧！</div>';
        return;
      }

      shoppingList.forEach((item) => {
        let priorityClass = item.priority === 'high' ? 'tag-high' : item.priority === 'medium' ? 'tag-medium' : 'tag-low';
        let priorityText = item.priority === 'high' ? '優先：高' : item.priority === 'medium' ? '優先：中' : '優先：低';
        let linkButton = item.link ? `<a href="${item.link}" target="_blank" class="btn-link">前往通路</a>` : '';

        const card = document.createElement('div');
        card.className = 'item-card';
        card.setAttribute('data-id', item.id);

        card.innerHTML = `
          <button class="btn-edit-dots" onclick="openEditForm(${item.id})" title="編輯商品">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
          </button>
          <img src="${item.image}" class="item-image" title="按住圖片可拖曳排序" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\' width=\\'200\\' height=\\'266\\'><rect width=\\'200\\' height=\\'266\\' fill=\\'%23EAEAEA\\'/></svg>'">
          <h3 class="item-title" title="${item.name}">${item.name}</h3>
          <div class="item-price">${formatPrice(item.price)}</div>
          <div class="item-meta"><span class="tag ${priorityClass}">${priorityText}</span>${linkButton}</div>
          <div class="item-actions"><button class="btn-delete" onclick="deleteItem(${item.id})">刪除</button></div>
        `;
        listPanel.appendChild(card);
      });
    };

    window.openEditForm = (id) => {
      const item = shoppingList.find(i => i.id === id);
      if (!item) return;
      editingId = id;
      document.getElementById('itemName').value = item.name;
      document.getElementById('itemPrice').value = item.price;
      document.getElementById('itemPriority').value = item.priority;
      document.getElementById('itemLink').value = item.link || '';
      currentBase64Image = item.image; 

      formTitle.innerText = `編輯商品：${item.name}`;
      imageLabel.innerText = `更換商品圖片 (若不更換請留空)`;
      btnSubmit.innerText = `儲存修改`;

      formPanel.classList.add('active');
      btnToggleForm.innerText = '- 收起表單';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const resetFormMode = () => {
      editingId = null;
      form.reset();
      currentBase64Image = '';
      formTitle.innerText = `新增商品項目`;
      imageLabel.innerText = `商品圖片`;
      btnSubmit.innerText = `儲存至清單`;
    };

    // 表單送出 (同步到 Google 試算表)
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (editingId === null && !currentBase64Image) {
        alert('請上傳商品圖片！'); return;
      }

      showLoading();
      try {
        if (editingId !== null) {
          // 修改雲端資料 (PATCH)
          const updatedData = {
            name: document.getElementById('itemName').value,
            price: Number(document.getElementById('itemPrice').value),
            priority: document.getElementById('itemPriority').value,
            link: document.getElementById('itemLink').value,
            image: currentBase64Image
          };
          await fetch(`${API_URL}/id/${editingId}`, {
            method: 'PATCH',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: updatedData })
          });
        } else {
          // 新增雲端資料 (POST)
          const newItem = {
            id: Date.now(),
            name: document.getElementById('itemName').value,
            price: Number(document.getElementById('itemPrice').value),
            priority: document.getElementById('itemPriority').value,
            link: document.getElementById('itemLink').value,
            image: currentBase64Image
          };
          await fetch(API_URL, {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [newItem] })
          });
        }
        
        // 重新從雲端抓取最新資料
        await loadData(); 
        resetFormMode();
        formPanel.classList.remove('active');
        btnToggleForm.innerText = '+ 新增商品';
        
      } catch (error) {
        console.error("儲存失敗", error);
        alert("儲存失敗，請檢查網路連線！");
      }
      hideLoading();
    });

    // 刪除資料 (同步到 Google 試算表)
    window.deleteItem = async (id) => {
      if (confirm('確定要刪除這張小卡紀錄嗎？')) {
        showLoading();
        try {
          await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
          if (editingId === id) resetFormMode();
          await loadData();
        } catch (error) {
          console.error("刪除失敗", error);
          alert("刪除失敗，請稍後再試！");
        }
        hideLoading();
      }
    };

    // 拖曳排序 (只儲存在本地端，節省 API 額度)
    new Sortable(listPanel, {
      handle: '.item-image',
      animation: 150,
      ghostClass: 'sortable-ghost',
      delay: 50,
      onEnd: function () {
        const currentCards = Array.from(listPanel.querySelectorAll('.item-card'));
        const newOrderIds = currentCards.map(card => Number(card.getAttribute('data-id')));
        // 記憶最新順序到本機
        localStorage.setItem('mySortOrderV6', JSON.stringify(newOrderIds));
      }
    });

    // 啟動 App 時執行
    loadData();
  </script>
</body>
</html>
