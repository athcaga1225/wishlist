<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待買清單</title>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    /* 全域色塊設定 */
    :root {
      --bg-color: #F4F5F7;
      --panel-bg: #FFFFFF;
      --text-main: #111111;
      --text-muted: #999999;
      --primary: #000000;
      --input-bg: #EAEAEA;

      /* TWICE 應援漸層色 */
      --twice-magenta: #FF4181;
      --twice-apricot: #F8CB9C;
      --twice-gradient: linear-gradient(135deg, var(--twice-magenta) 0%, var(--twice-apricot) 100%);

      /* 優先順序色塊 */
      --priority-high: #FF3B30;
      --priority-medium: #FF9500;
      --priority-low: #34C759;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      height: 100vh;           /* 強制高度為視窗高度 */
      display: flex;
      flex-direction: column;  /* 垂直排列 */
      overflow: hidden;        /* 禁止整個網頁滾動 */
    }

    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100%;            /* 撐滿高度 */
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;        /* 確保內容不溢出 */
    }

    /* 確保 Dashboard 和 Form 固定，不被內容擠壓 */
    .dashboard, .form-panel {
      flex-shrink: 0;
    }

    /* 頂部統計區塊 */
    .dashboard {
      background: var(--twice-gradient);
      color: #FFFFFF;
      padding: 24px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .dashboard-stats h1 {
      margin: 0;
      font-size: 24px;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
    }

    .dashboard-stats p {
      margin: 8px 0 0 0;
      font-size: 16px;
      color: #FFFFFF;
      opacity: 0.9;
    }

    .btn-toggle-form {
      background-color: #FFFFFF;
      color: var(--twice-magenta);
      border: none;
      padding: 12px 0;
      width: 140px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }

    /* 上稿表單區塊 */
    .form-panel {
      background-color: var(--panel-bg);
      padding: 30px;
      margin-bottom: 30px;
      display: none;
      border-radius: 8px;
    }

    .form-panel.active {
      display: block;
    }

    .form-panel h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: var(--twice-magenta);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    /* 輸入框設定 */
    input {
      padding: 12px;
      background-color: #f2f2f2;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-main);
      border-radius: 4px;
    }

    input[type="file"] {
      padding: 9px;
      cursor: pointer;
    }

    /* 下拉選單：統一清除原生箭頭 */
    select {
      appearance: none; 
      -webkit-appearance: none; 
      padding: 12px 36px 12px 12px; 
      background-color: #f2f2f2;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-main);
      border-radius: 4px;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center; 
      background-size: 14px;
    }

    .btn-submit {
      grid-column: 1 / -1;
      background: var(--twice-gradient);
      color: #FFFFFF;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 4px;
      transition: opacity 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.85;
    }

    /* 列表區塊：設置為可滾動區域 */
    .list-panel {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      overflow-y: auto;        /* 超出範圍時出現滾動條 */
      padding: 5px;            /* 留一點點邊距給滾動條 */
      flex-grow: 1;            /* 填滿剩餘空間 */
    }

    @media (max-width: 650px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .list-panel {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    /* 卡片設計 */
    .item-card {
      position: relative;
      background-color: var(--panel-bg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      box-sizing: border-box;
      height: fit-content;    /* 修正：讓高度隨內容調整，不再強行拉伸 */
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sortable-ghost {
      opacity: 0.4;
      background-color: #EAEAEA;
      transform: scale(0.98);
    }

    /* 右上角懸浮編輯按鈕 */
    .btn-edit-dots {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 32px;
      height: 32px;
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .item-card:hover .btn-edit-dots {
      opacity: 1;
    }

    .btn-edit-dots svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-main);
      fill: none;
    }

    /* 圖片設定 */
    .item-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      background-color: var(--input-bg);
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 12px;
      cursor: grab;
    }

    .item-title {
      font-size: 15px;
      font-weight: bold;
      margin: 0 0 6px 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      min-height: 2.8em;
    }

    .item-price {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 16px;
    }

    .tag {
      padding: 4px 8px;
      font-size: 12px;
      font-weight: bold;
      color: #FFFFFF;
      border-radius: 4px;
    }

    .tag-high { background-color: var(--priority-high); }
    .tag-medium { background-color: var(--priority-medium); }
    .tag-low { background-color: var(--priority-low); }

    .btn-link {
      background-color: var(--twice-magenta);
      color: #FFFFFF;
      text-decoration: none;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* 下方操作區塊：修正 margin-top 以防拉伸 */
    .item-actions {
      display: flex;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--input-bg);
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
      margin-left: auto;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="dashboard">
      <div class="dashboard-stats">
        <h1>待買清單</h1>
        <p id="statsText">0 項 ｜ NT$ 0</p>
      </div>
      <button class="btn-toggle-form" id="btnToggleForm">+ 新增商品</button>
    </div>

    <div class="form-panel" id="formPanel">
      <h2 id="formTitle">新增商品項目</h2>
      <form id="addItemForm">
        <div class="form-grid">
          <div class="form-group">
            <label id="imageLabel">商品圖片</label>
            <input type="file" id="itemImageFile" accept="image/*">
          </div>
          <div class="form-group">
            <label>品名</label>
            <input type="text" id="itemName" placeholder="例如：SANA 會場限定隨機小卡" required>
          </div>
          <div class="form-grid" style="grid-column: span 1; gap: 20px; padding: 0;">
            <div class="form-group">
              <label>價格</label>
              <input type="number" id="itemPrice" placeholder="輸入數字" required>
            </div>
            <div class="form-group">
              <label>優先順序</label>
              <select id="itemPriority">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>通路連結 (選填)</label>
            <input type="url" id="itemLink" placeholder="https://...">
          </div>
          <button type="submit" class="btn-submit" id="btnSubmit">儲存至清單</button>
        </div>
      </form>
    </div>

    <div class="list-panel" id="listPanel"></div>
  </div>

  <script>
const form = document.getElementById('addItemForm');
    const listPanel = document.getElementById('listPanel');
    const formPanel = document.getElementById('formPanel');
    const btnToggleForm = document.getElementById('btnToggleForm');
    const statsText = document.getElementById('statsText');
    const API_URL = 'https://sheetdb.io/api/v1/你的API_ID'; // <--- 請填入你專屬的 SheetDB API 網址

    let shoppingList = [];
    let currentBase64Image = '';
    let editingId = null;

    btnToggleForm.addEventListener('click', () => {
      formPanel.classList.toggle('active');
      btnToggleForm.innerText = formPanel.classList.contains('active') ? '- 收起表單' : '+ 新增商品';
    });

    document.getElementById('itemImageFile').addEventListener('change', (e) => {
      const reader = new FileReader();
      reader.onload = (evt) => currentBase64Image = evt.target.result;
      reader.readAsDataURL(e.target.files[0]);
    });

    // 從 Google Sheet 獲取資料
    const fetchData = async () => {
      try {
        const response = await fetch(API_URL);
        shoppingList = await response.json();
        renderList();
      } catch (error) {
        console.error("讀取失敗:", error);
      }
    };

    const updateStats = () => {
      const total = shoppingList.reduce((sum, item) => sum + Number(item.price || 0), 0);
      statsText.innerText = `${shoppingList.length} 項 ｜ NT$ ${total}`;
    };

    const renderList = () => {
      listPanel.innerHTML = '';
      updateStats();
      shoppingList.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.setAttribute('data-id', item.id);
        card.innerHTML = `
          <img src="${item.image}" class="item-image">
          <div class="member-tag">${item.member || ''}</div>
          <h3 class="item-title">${item.name}</h3>
          <div class="item-price">NT$ ${item.price}</div>
          <div class="item-actions"><button class="btn-delete" onclick="deleteItem('${item.id}')">刪除</button></div>
        `;
        listPanel.appendChild(card);
      });
    };

    // 新增資料到 Google Sheet
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newItem = {
        id: Date.now(),
        image: currentBase64Image,
        member: document.getElementById('itemMember').value,
        name: document.getElementById('itemName').value,
        price: document.getElementById('itemPrice').value
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: {'Accept': 'application/json', 'Content-Type': 'application/json'},
          body: JSON.stringify({ data: [newItem] })
        });
        form.reset();
        currentBase64Image = '';
        formPanel.classList.remove('active');
        fetchData(); // 重新讀取
      } catch (error) {
        alert("新增失敗，請檢查網路或API設定");
      }
    });

    // 刪除資料
    window.deleteItem = async (id) => {
      if(confirm('確定刪除？')) {
        try {
          await fetch(`${API_URL}/id/${id}`, { method: 'DELETE' });
          fetchData(); // 重新讀取
        } catch (error) {
          alert("刪除失敗");
        }
      }
    };

    // 排序與拖曳
    new Sortable(listPanel, {
      handle: '.item-image',
      animation: 150,
      onEnd: () => {
        // 這裡因為已改用雲端，若需要排序需更複雜的 API 更新，
        // 建議先確保「新增/刪除」功能運作正常後，我們再討論「排序 API」的寫法
      }
    });

    // 初始化讀取
    fetchData();
  </script>
</body>
</html>
