```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待買清單</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    :root {
      --bg-color: #F4F5F7; --panel-bg: #FFFFFF; --text-main: #111111; --text-muted: #999999;
      --twice-magenta: #FF4181; --twice-apricot: #F8CB9C;
      --twice-gradient: linear-gradient(135deg, var(--twice-magenta) 0%, var(--twice-apricot) 100%);
      --priority-high: #FF3B30; --priority-medium: #FF9500; --priority-low: #34C759;
    }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .container { max-width: 1000px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; padding: 10px; box-sizing: border-box; overflow: hidden; }
    .dashboard { background: var(--twice-gradient); color: #FFFFFF; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-radius: 8px; }
    .btn-toggle-form { background-color: #FFFFFF; color: var(--twice-magenta); border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    .form-panel { background-color: var(--panel-bg); padding: 20px; margin-bottom: 15px; display: none; border-radius: 8px; max-height: 65vh; overflow-y: auto; }
    .form-panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .list-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; overflow-y: auto; padding: 5px; flex-grow: 1; }
    .item-card { position: relative; background-color: var(--panel-bg); padding: 10px; border-radius: 8px; border: 1px solid #eee; }
    .item-image { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; border-radius: 6px; cursor: grab; }
    .btn-delete { background: #fee; border: 1px solid #fcc; color: #d00; padding: 5px 10px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
    @media (max-width: 650px) { .list-panel { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="dashboard">
      <div><h1 style="margin:0;font-size:18px;">待買清單</h1><p id="statsText" style="margin:0;font-size:12px;">載入中...</p></div>
      <button class="btn-toggle-form" id="btnToggleForm">+ 新增</button>
    </div>
    <div class="form-panel" id="formPanel">
      <form id="addItemForm">
        <div class="form-grid">
          <div style="grid-column:1/-1"><label>圖片</label><input type="file" id="itemImageFile" accept="image/*"></div>
          <div><label>品名</label><input type="text" id="itemName" required style="width:90%"></div>
          <div><label>價格</label><input type="number" id="itemPrice" required style="width:90%"></div>
          <button type="submit" id="btnSubmit" style="grid-column:1/-1;padding:10px;">儲存</button>
        </div>
      </form>
    </div>
    <div class="list-panel" id="listPanel"></div>
  </div>

  <script>
    const API_URL = 'https://sheetdb.io/api/v1/lbfdjay316stk';
    let allItems = [];

    async function fetchData() {
      const res = await fetch(API_URL);
      allItems = await res.json();
      renderList(allItems);
    }

    function renderList(list) {
      const panel = document.getElementById('listPanel');
      panel.innerHTML = '';
      document.getElementById('statsText').innerText = `${list.length} 項`;
      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item-card';
        div.innerHTML = `
          <img src="${item.image}" class="item-image" draggable="false">
          <div style="font-weight:bold;margin-top:5px;">${item.name}</div>
          <div>$${item.price}</div>
          <button class="btn-delete" onclick="deleteItem('${item.id}')">刪除</button>
        `;
        panel.appendChild(div);
      });
    }

    // 🚨 終極刪除法：使用 query 查詢式刪除，這是 SheetDB 最穩定的刪除方式
    window.deleteItem = async function(id) {
      if(!confirm('確認刪除？')) return;
      try {
        // 直接呼叫 API 刪除，並配合 query 參數指定要刪除的 ID
        await fetch(`${API_URL}/delete?id=${id}`, { method: 'DELETE' });
        allItems = allItems.filter(i => String(i.id) !== String(id));
        renderList(allItems);
      } catch(e) { alert('刪除失敗，請確認網路或 API 設定'); }
    }

    document.getElementById('addItemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('itemName').value;
      const price = document.getElementById('itemPrice').value;
      const newItem = { id: Date.now(), name, price, image: "https://via.placeholder.com/150" };
      await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ data: [newItem] }) });
      allItems.push(newItem);
      renderList(allItems);
      document.getElementById('formPanel').classList.remove('active');
    });

    document.getElementById('btnToggleForm').onclick = () => document.getElementById('formPanel').classList.toggle('active');
    fetchData();
  </script>
</body>
</html>
